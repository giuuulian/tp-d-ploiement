name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app-deployment
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run unit tests
        run: npm test
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Start application
        run: |
          npm start &
          echo $! > pid.txt
          sleep 5
      
      - name: Wait for application to be ready
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:3000/health; then
              echo "Application is ready!"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts - waiting for app..."
            sleep 2
          done
          echo "Application failed to start!"
          exit 1
      
      - name: Run E2E tests with Cypress
        run: npm run e2e
      
      - name: Stop application
        if: always()
        run: |
          if [ -f pid.txt ]; then
            kill $(cat pid.txt) || true
          fi
      
      - name: Upload Cypress videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/azure_key
          chmod 600 ~/.ssh/azure_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Deploy application
        run: |
          ssh -i ~/.ssh/azure_key ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} \
          'bash -s' << 'EOF'
          set -e
          
          # Variables
          CONTAINER_NAME="myapp"
          IMAGE="${{ env.IMAGE_NAME }}:latest"
          PORT=3000
          
          echo "=== Starting deployment ==="
          echo "Image: $IMAGE"
          echo "Container: $CONTAINER_NAME"
          
          # Login to Docker Hub
          echo "=== Logging in to Docker Hub ==="
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          # Pull the latest image
          echo "=== Pulling Docker image ==="
          docker pull $IMAGE
          
          # Stop and remove existing container (idempotent)
          echo "=== Stopping existing container ==="
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
          
          # Start new container
          echo "=== Starting new container ==="
          docker run -d \
            --name $CONTAINER_NAME \
            -p $PORT:$PORT \
            -e NODE_ENV=production \
            -e PORT=$PORT \
            --restart unless-stopped \
            $IMAGE
          
          # Wait for container to start
          echo "=== Waiting for container to be ready ==="
          sleep 5
          
          # Check if container is running
          if ! docker ps | grep -q $CONTAINER_NAME; then
            echo "ERROR: Container is not running!"
            docker logs $CONTAINER_NAME || true
            exit 1
          fi
          
          echo "=== Deployment completed successfully ==="
          EOF
      
      - name: Health check
        run: |
          ssh -i ~/.ssh/azure_key ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} \
          'bash -s' << 'EOF'
          set -e
          
          echo "=== Running health check ==="
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -f -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
            
            if [ "$response" = "200" ]; then
              echo "✓ Application is healthy (HTTP $response)"
              curl -s http://localhost:3000/health | jq .
              exit 0
            fi
            
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts - HTTP $response"
            sleep 2
          done
          
          echo "ERROR: Health check failed after $max_attempts attempts"
          docker ps
          docker logs myapp
          exit 1
          EOF
      
      - name: Verify endpoints
        run: |
          ssh -i ~/.ssh/azure_key ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} \
          'bash -s' << 'EOF'
          echo "=== Verifying API endpoints ==="
          
          # Health endpoint
          echo "🔍 Testing /health"
          curl -s http://localhost:3000/health | jq .
          
          # Tasks endpoint
          echo "🔍 Testing /api/tasks"
          curl -s http://localhost:3000/api/tasks | jq .
          
          echo ""
          echo "✓ All endpoints are accessible"
          EOF
      
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/azure_key
